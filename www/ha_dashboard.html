ard';card.id=`c-${net.id}`;   const s=states[net.id];const on=s?.state==='connected';   const cpuId=net.id.replace('_state','_cpu_utilization');const memId=net.id.replace('_state','_memory_utilization');   const cpu=states[cpuId]?.state;const mem=states[memId]?.state;   card.innerHTML=`     <div class="nd"><div class="nd-ic ${on?'on':'off'}"><i class="mdi ${net.icon}"></i></div><div class="nd-i"><div class="nd-n">${net.name}</div><div class="nd-m">${on?'● Online':'○ Offline'}</div></div>${cpu!==undefined?`<div class="nd-s"><div class="nd-sv"><div class="nd-sv-v">${cpu}%</div><div class="nd-sv-l">CPU</div></div><div class="nd-sv"><div class="nd-sv-v">${mem}%</div><div class="nd-sv-l">MEM</div></div></div>`:''}</div>`;   return card; }  function renderSensor(sensor){   const card=document.createElement('div');card.className='card sc';card.id=`c-${sensor.id}`;   const s=states[sensor.id];const v=s?.state||'--';   const pct=sensor.max?Math.min(100,(v/sensor.max)*100):0;   const color=pct>80?'var(--red)':pct>60?'var(--yellow)':'var(--green)';   card.innerHTML=`     <div class="sc-v">${v}<span class="sc-u">${sensor.unit||''}</span></div>     <div class="sc-l">${sensor.name}</div>     ${sensor.max?`<div class="sc-bar"><div class="sc-fill" style="width:${pct}%;background:${color}"></div></div>`:''}`;   return card; }  function renderAlarm(){   const card=document.createElement('div');card.className='card alm';   const a=states[E.alarm];const st=a?.state||'unknown';const dis=st==='disarmed';   card.innerHTML=`     <div class="alm-ic">${dis?'🔓':'🔒'}</div>     <div class="alm-st" style="color:${dis?'var(--text2)':'var(--green)'}">${st.toUpperCase()}</div>     <div class="alm-mo">Car Alarm</div>     <div class="alm-act"><button class="alm-btn a" onclick="call('alarm_control_panel','alarm_arm_away','${E.alarm}')">Arm Away</button><button class="alm-btn d" onclick="call('alarm_control_panel','alarm_disarm','${E.alarm}')">Disarm</button></div>`;   return card; }  function renderScenes(){   const card=document.createElement('div');card.className='card';   card.innerHTML=`     <div class="card-h"><div class="card-t">Quick Actions</div></div>     <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">       <button class="lc-btn" onclick="call('scene','turn_on','scene.default_baseboard_on')" style="display:flex;align-items:center;justify-content:center;gap:6px"><i class="mdi mdi-radiator"></i>Baseboard</button>       <button class="lc-btn" onclick="call('script','turn_on','script.purple_lights')" style="display:flex;align-items:center;justify-content:center;gap:6px"><i class="mdi mdi-lightbulb-on" style="color:var(--purple)"></i>Purple</button>       <button class="lc-btn" onclick="call('alarm_control_panel','alarm_arm_away','${E.alarm}')" style="display:flex;align-items:center;justify-content:center;gap:6px"><i class="mdi mdi-shield-car"></i>Arm Car</button>       <button class="lc-btn" onclick="call('alarm_control_panel','alarm_disarm','${E.alarm}')" style="display:flex;align-items:center;justify-content:center;gap:6px"><i class="mdi mdi-shield-off"></i>Disarm</button>     </div>`;   return card; }  // UPDATE SINGLE CARD function updateCard(eid){   const card=document.getElementById(`c-${eid}`);   if(!card)return;   if(eid.startsWith('light.')){     const def=E.lights.find(l=>l.id===eid);     if(def){const nc=renderLightCard(def);card.replaceWith(nc)}   }else if(eid.startsWith('media_player.')){     const def=E.media.find(m=>m.id===eid);     if(def){const nc=renderMediaCard(def);card.replaceWith(nc)}   }else if(eid.includes('_state')){     const def=E.network.find(n=>n.id===eid);     if(def){const nc=renderNet(def);card.replaceWith(nc)}   }else if(eid===E.alarm){     const nc=renderAlarm();card.replaceWith(nc)   }else if(eid===E.weather){     // Re-render weather bar   } }  // UTILS function setConn(s){   const el=document.getElementById('conn');   if(s==='connected'){el.className='conn';el.innerHTML='<div class="dot"></div><span>Connected</span>'}   else if(s==='connecting'){el.className='conn off';el.innerHTML='<div class="dot"></div><span>Connecting...</span>'}   else{el.className='conn off';el.innerHTML='<div class="dot"></div><span>Disconnected</span>'} }  function showToast(msg,type=''){   const t=document.getElementById('toast');t.textContent=msg;t.className=`toast show ${type}`;   setTimeout(()=>t.className='toast',3000); }  function showLogin(){   document.getElementById('main').innerHTML=`     <div class="login"><div class="login-box">       <div class="login-ic">🏠</div>       <h2>Connect to Home Assistant</h2>       <p>Enter your long-lived access token</p>       <input type="text" id="tokIn" placeholder="Long-lived access token">       <button onclick="saveTok()">Connect</button>       <p class="hint">Stored locally in your browser</p>     </div></div>`; }  function saveTok(){   const v=document.getElementById('tokIn').value.trim();   if(!v)return;   localStorage.setItem('ha_token',v);token=v;connect(); }  // CLOCK setInterval(()=>{document.getElementById('clock').textContent=new Date().toLocaleTimeString('en-US',{hour12:false})},1000);  // CAMERA REFRESH setInterval(()=>{document.querySelectorAll('.cam-f img').forEach(img=>{const s=img.src.split('&_=')[0];img.src=`${s}&_=${Date.now()}`})},10000);  // INIT if(token){connect()}else{showLogin()} </script> </body> </html>
